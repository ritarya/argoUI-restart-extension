apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-nginx
  namespace: test-app
  labels:
    app: sample-nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-nginx
  template:
    metadata:
      labels:
        app: sample-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: sample-nginx
  namespace: test-app
spec:
  selector:
    app: sample-nginx
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
