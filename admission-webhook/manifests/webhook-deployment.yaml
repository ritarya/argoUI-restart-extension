apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-rfc-webhook
  namespace: argocd
  labels:
    app: argocd-rfc-webhook
spec:
  replicas: 2
  selector:
    matchLabels:
      app: argocd-rfc-webhook
  template:
    metadata:
      labels:
        app: argocd-rfc-webhook
    spec:
      serviceAccountName: argocd-rfc-webhook
      containers:
        - name: webhook
          image: your-registry/argocd-rfc-webhook:latest
          ports:
            - containerPort: 8443
          env:
            - name: REDIS_ADDR
              value: redis.argocd.svc.cluster.local:6379
            - name: TLS_CERT_FILE
              value: /etc/webhook-tls/tls.crt
            - name: TLS_KEY_FILE
              value: /etc/webhook-tls/tls.key
          volumeMounts:
            - name: tls
              mountPath: /etc/webhook-tls
              readOnly: true
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 5
      volumes:
        - name: tls
          secret:
            # Populated by cert-manager Certificate resource
            secretName: argocd-rfc-webhook-tls
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-rfc-webhook
  namespace: argocd
spec:
  selector:
    app: argocd-rfc-webhook
  ports:
    - port: 443
      targetPort: 8443
  type: ClusterIP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-rfc-webhook
  namespace: argocd
