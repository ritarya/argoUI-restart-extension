apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rfc-validator
  namespace: argocd
spec:
  podSelector:
    matchLabels:
      app: rfc-validator
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Only argocd-server may call the middleware
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: argocd-server
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Redis (in-cluster)
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    # On-prem ITSM API via VPN/Direct Connect — replace CIDR with your corporate range
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
      ports:
        - protocol: TCP
          port: 443
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
