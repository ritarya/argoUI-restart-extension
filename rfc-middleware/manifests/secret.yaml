# Option A: static Secret (base64-encode values before applying)
#   echo -n 'value' | base64
# Option B: replace with ExternalSecret referencing AWS Secrets Manager (preferred for prod)
apiVersion: v1
kind: Secret
metadata:
  name: rfc-middleware-itsm-credentials
  namespace: argocd
type: Opaque
data:
  # Okta application credentials — used as Basic auth on the token endpoint
  client_id:     <base64-encoded-okta-client-id>
  client_secret: <base64-encoded-okta-client-secret>
  # ITSM service-account credentials — sent in the token request form body
  username: <base64-encoded-itsm-username>
  password: <base64-encoded-itsm-password>
---
apiVersion: v1
kind: Secret
metadata:
  name: rfc-middleware-config
  namespace: argocd
type: Opaque
data:
  # base64("https://your-instance.service-now.com")
  itsm_base_url: <base64-encoded-url>
  # Full token endpoint URL; omit to default to {itsm_base_url}/oauth_token.do
  itsm_token_url: <base64-encoded-token-url>
  # OAuth2 scope; omit to default to "openid"
  itsm_scope: <base64-encoded-scope>
