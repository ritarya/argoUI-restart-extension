# Option A: static Secret (base64-encode values before applying)
# Option B: replace with ExternalSecret referencing AWS Secrets Manager (preferred)
apiVersion: v1
kind: Secret
metadata:
  name: rfc-middleware-itsm-tls
  namespace: argocd
type: kubernetes.io/tls
data:
  # base64-encoded mTLS client certificate and key
  tls.crt: <base64-encoded-cert>
  tls.key: <base64-encoded-key>
---
apiVersion: v1
kind: Secret
metadata:
  name: rfc-middleware-config
  namespace: argocd
type: Opaque
data:
  # base64("https://your-instance.service-now.com")
  itsm_base_url: <base64-encoded-url>
