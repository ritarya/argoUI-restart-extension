apiVersion: apps/v1
kind: Deployment
metadata:
  name: rfc-validator
  namespace: argocd
  labels:
    app: rfc-validator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rfc-validator
  template:
    metadata:
      labels:
        app: rfc-validator
    spec:
      serviceAccountName: rfc-validator
      containers:
        - name: rfc-validator
          image: your-registry/rfc-validator:latest
          ports:
            - containerPort: 8080
          env:
            - name: ITSM_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: rfc-middleware-config
                  key: itsm_base_url
            - name: ITSM_TOKEN_URL
              valueFrom:
                secretKeyRef:
                  name: rfc-middleware-config
                  key: itsm_token_url
                  optional: true   # defaults to {ITSM_BASE_URL}/oauth_token.do when absent
            - name: ITSM_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: rfc-middleware-itsm-credentials
                  key: client_id
            - name: ITSM_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: rfc-middleware-itsm-credentials
                  key: client_secret
            - name: ITSM_USERNAME
              valueFrom:
                secretKeyRef:
                  name: rfc-middleware-itsm-credentials
                  key: username
            - name: ITSM_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rfc-middleware-itsm-credentials
                  key: password
            - name: ITSM_SCOPE
              valueFrom:
                secretKeyRef:
                  name: rfc-middleware-config
                  key: itsm_scope
                  optional: true   # defaults to "openid" when absent
            - name: LOG_LEVEL
              value: info
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rfc-validator
  namespace: argocd
spec:
  selector:
    app: rfc-validator
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rfc-validator
  namespace: argocd
